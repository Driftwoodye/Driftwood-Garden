<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driftwood Garden</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root{--bg:#07101d;--panel:#0f172a;--line:#26354f;--text:#e5e7eb;--muted:#94a3b8;--green:#34d399;--amber:#fbbf24}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#15382e 0,var(--bg) 42%,#030712 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{position:sticky;top:0;z-index:5;background:rgba(7,16,29,.96);border-bottom:1px solid var(--line)}
.wrap,main{max-width:1280px;margin:auto;padding:10px}
h1{margin:0 0 8px;color:var(--green);font-size:24px}h1 a{color:inherit;text-decoration:none}
.tabs,.controls{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}
.priority-wrap{display:flex;flex-direction:column;gap:3px}
.legend{display:none;margin:0 2px;color:var(--muted);font-size:11px}
button,input,select{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-size:13px}
button{cursor:pointer}.tab.active{color:var(--green);border-color:var(--green);background:rgba(6,78,59,.32)}
input{min-width:min(330px,100%)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;padding-bottom:60px}
.card{background:linear-gradient(180deg,rgba(17,24,39,.98),rgba(15,23,42,.98));border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;min-height:310px;cursor:pointer}.card:hover{border-color:#3f567a}
.photo,.placeholder{height:178px;background:#0b1220;border-bottom:1px solid var(--line);display:flex}.photo img{flex:1;min-width:0;width:100%;height:100%;display:block;object-fit:contain}.photo.multi img{object-fit:cover}.photo.multi img:not(:last-child){border-right:1px solid var(--line)}.placeholder{align-items:center;justify-content:center;color:#7c8aa5;font-size:12px;background:linear-gradient(135deg,rgba(21,56,46,.55),rgba(11,18,32,.95))}
.body{padding:15px;display:flex;flex-direction:column;gap:12px;flex:1}.top{display:flex;gap:8px;justify-content:space-between}.badge{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:6px 8px;background:#0b1220;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.family{color:var(--green);border-color:#14532d;background:rgba(6,78,59,.35)}.rating{color:var(--amber);border-color:#78350f;background:rgba(120,53,15,.25)}
.name{font-size:20px;font-weight:800;font-style:italic;line-height:1.15}.common{color:var(--muted);font-size:13px;line-height:1.35}.notes{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:12px;line-height:1.4;color:#cbd5e1}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini.single{grid-template-columns:1fr}.mini.triple{grid-template-columns:repeat(3,1fr)}.mini div{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:9px;min-width:0}.label{display:block;color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:5px}.value{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.footer{border-top:1px solid var(--line);padding-top:10px;display:flex;justify-content:space-between;gap:10px;color:#718096;font-size:11px}.footer a{color:var(--green);text-decoration:none}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px;padding:45px 20px;background:rgba(15,23,42,.5)}dialog{border:1px solid var(--line);border-radius:20px;background:var(--panel);color:var(--text);width:min(980px,94vw);padding:0}dialog::backdrop{background:rgba(0,0,0,.65)}.modal-head{padding:18px 20px;background:#111827;border-bottom:1px solid var(--line);border-radius:20px 20px 0 0;display:flex;gap:12px;justify-content:space-between}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;max-height:72vh;overflow:auto}.field{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:10px}.field.full{grid-column:1/-1}.field-title{color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;margin-bottom:6px}.field-value{font-size:13px;line-height:1.45;word-break:break-word}.field-value a{color:var(--green);text-decoration:none}.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}.gallery figure{margin:0;background:#070d18;border:1px solid var(--line);border-radius:12px;overflow:hidden}.gallery img{width:100%;height:220px;object-fit:contain;background:#0b1220;display:block;cursor:zoom-in}.gallery figcaption{padding:8px 10px;color:#94a3b8;font-size:11px;line-height:1.35}#imgDlg{width:100vw;height:100vh;max-width:100vw;max-height:100vh;border:0;border-radius:0;background:#020617;padding:0}#imgDlg::backdrop{background:#000}#imgFull{width:100%;height:100%;object-fit:contain;display:block;background:#000;cursor:pointer}#imgClose{position:fixed;right:16px;top:16px;z-index:10}.imgNav{position:fixed;top:50%;transform:translateY(-50%);z-index:10;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:.55;cursor:pointer;transition:opacity .15s}.imgNav:hover{opacity:.9}.imgNav.left{left:16px}.imgNav.right{right:16px}.imgNav.hide{display:none}.to-top{position:fixed;right:18px;bottom:18px;width:44px;height:44px;border-radius:50%;padding:0;font-size:22px;border-color:var(--green);color:var(--green);opacity:0;pointer-events:none;transition:.18s}.to-top.show{opacity:1;pointer-events:auto}@media(max-width:760px){button,input,select{font-size:12px;padding:6px 7px}input,select{width:100%}.photo,.placeholder{height:165px}.gallery{grid-template-columns:1fr}.gallery img{height:260px}}
</style>
</head>
<body>
<header><div class="wrap"><h1><a href="/Driftwood-Garden/">Driftwood Garden</a></h1><div class="tabs"><button id="plantsBtn" class="tab active">Plants</button><button id="seedsBtn" class="tab">Seeds</button><button id="bulbsBtn" class="tab">Bulbs</button><button id="wishlistBtn" class="tab">Wishlist</button></div><div class="controls"><input id="search" type="search" placeholder="Search..."><div class="priority-wrap"><select id="priority"></select><div id="legend" class="legend"></div></div><select id="filterFamily"><option value="all">All families</option></select><select id="filterA"><option value="all">All locations</option></select><select id="filterB"><option value="all">All statuses</option></select></div></div></header>
<main><div id="grid" class="grid"><div class="empty">Loading catalogue...</div></div></main>
<button id="toTop" class="to-top" aria-label="Back to top">↑</button>
<dialog id="dlg"><div class="modal-head"><div><div id="badges"></div><div id="title" class="name"></div><div id="common" class="common"></div></div><button id="closeBtn">Close</button></div><div id="modal" class="modal-body"></div></dialog>
<dialog id="imgDlg"><button id="imgClose">Close</button><button id="imgPrev" class="imgNav left" aria-label="Previous image">‹</button><img id="imgFull" alt=""><button id="imgNext" class="imgNav right" aria-label="Next image">›</button></dialog>
<script>
const $=id=>document.getElementById(id);
const files={wishlist:'wishlist.csv',plants:'plants.csv',seeds:'seeds.csv',bulbs:'bulbs.csv',images:'images.csv',illustrations:'illustrations.csv'};
const maps={wishlist:{id:'Wishlist ID',rating:'Priority',status:'Status',name:'Scientific name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Native origin',location:'Future location',difficulty:'Difficulty',notes:'Notes',light:'Light needs',water:'Water needs',soil:'Soil / substrate',substrate:'Recommended substrate mix (%)',buy:'Where to buy EU/UK',wiki:'Wikipedia',powo:'Kew POWO / source search',rarity:'Rarity in cultivation',conservation:'Conservation / endangerment level',pollinators:'Pollinators / ecology'},plants:{id:'Plant ID',status:'Status',name:'Scientific name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Original geographical provenance',source:'Source / acquired',location:'Current location',wiki:'Wikipedia'},seeds:{id:'Seed Lot ID',rating:'Germination priority',status:'Status',name:'Scientific name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Seed lot origin',difficulty:'Viability status',notes:'Species notes',count:'Estimated seed count',storage:'Storage method',sowby:'Estimated sow-by date',pretreat:'Pretreatment needed',germination:'Germination instructions',source:'Source type',wikiTitle:'Wikipedia title',wiki:'Wikipedia'},bulbs:{id:'Bulb Lot ID',rating:'Planting priority',status:'Status',name:'Catalog name',scientific:'Scientific name',cultivar:'Cultivar / trade name',family:'Family',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',material:'Material type',group:'Bulb group / type',count:'Quantity remaining',bought:'Quantity bought',planted:'Quantity planted',purchaseDate:'Purchase date',origin:'Purchase location',source:'Seller / source',country:'Country of purchase',color:'Flower colour',period:'Flowering period',height:'Height',depth:'Planting depth',spacing:'Spacing',light:'Light',soil:'Soil / drainage',hardiness:'Hardiness',location:'Intended location',imageFile:'Image filename',imageSource:'Image source',imageRights:'Image rights/status',notes:'Notes',wiki:'Wikipedia'}};
const legends={wishlist:'★ Rarity',plants:'',seeds:'★ germination urgency',bulbs:'★ germination urgency'},ratingLabels={wishlist:'All star ratings',plants:'All star ratings',seeds:'All star ratings',bulbs:'All bulb priorities'},locationLabels={wishlist:'All locations',plants:'All locations',seeds:'Future location',bulbs:'Future location'};
const fieldLabels={id:'Plant ID',name:'Scientific name',common:'Common name EN',commonDe:'Common name DE',commonPt:'Common name PT',origin:'Origin',source:'Source',location:'Current location',wiki:'Wikipedia'};
let mode='plants',data={wishlist:[],plants:[],seeds:[],bulbs:[]},imageRows=[],byKey=new Map(),imageCache=new Map();
function clean(v){return(v??'').toString().trim()}
function esc(v){return clean(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function stars(v){return clean(v).split('★').length-1}
function alpha(a,b){return clean(a.name).localeCompare(clean(b.name),undefined,{sensitivity:'base'})}
function baseName(n){return clean(n).replace(/\s+['"].*?['"].*$/,'').replace(/\s+cv\..*$/i,'').replace(/\s+var\..*$/i,'').trim()}
function isYes(v){return /^(yes|true|1|primary|x)$/i.test(clean(v))}
function parseCSV(text){const rows=[];let row=[],cell='',quote=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'&&quote&&next==='"'){cell+='"';i++}else if(ch==='"'){quote=!quote}else if(ch===','&&!quote){row.push(cell);cell=''}else if((ch==='\n'||ch==='\r')&&!quote){if(ch==='\r'&&next==='\n')i++;row.push(cell);rows.push(row);row=[];cell=''}else cell+=ch}row.push(cell);rows.push(row);return rows.filter(r=>r.some(c=>clean(c)))}
function toObjects(text){const m=parseCSV(text||''),h=(m[0]||[]).map(x=>clean(x).replace(/^\uFEFF/,''));return m.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k]=r[i]??'');return o})}
function transform(rows,map,type){return rows.map(r=>{const o={type};Object.entries(map).forEach(([k,col])=>o[k]=clean(r[col]));if(!o.wiki&&/^https?:\/\//i.test(o.wikiTitle)){o.wiki=o.wikiTitle;o.wikiTitle=''}if(type==='bulbs'&&!o.name)o.name=[o.scientific,o.cultivar].filter(Boolean).join(' ');o.stars=stars(o.rating);o.key=type+':'+o.id;return o}).filter(x=>x.id&&x.name).sort(alpha)}
function mergeById(rows){const m=new Map();rows.forEach(x=>{if(x.id)m.set(x.id,x)});return [...m.values()].sort(alpha)}
function bust(url){return url+(url.includes('?')?'&':'?')+'_='+Date.now()}
async function fetchText(url){const res=await fetch(bust(url));if(!res.ok)throw Error(url+' '+res.status);return res.text()}
async function optionalCSV(url){try{return await fetchText(url)}catch(e){console.warn('CSV failed:',url,e);return ''}}
function current(){return data[mode]||[]}
function countValues(key){return current().reduce((m,x)=>{const v=clean(x[key]);if(v)m[v]=(m[v]||0)+1;return m},{})}
function unique(key){return Object.keys(countValues(key)).sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}))}
function optionText(label,count){return label+' ('+count+')'}
function commonHtml(x){const p=[];if(x.common)p.push('EN: '+esc(x.common));if(x.commonDe)p.push('DE: '+esc(x.commonDe));if(x.commonPt)p.push('PT: '+esc(x.commonPt));return p.join(' · ')||'—'}
function titleForWiki(x){const fromLink=clean(x.wiki).split('/wiki/')[1],raw=clean(x.wikiTitle)||(fromLink?fromLink.replace(/_/g,' '):'')||x.name;try{return decodeURIComponent(raw)}catch(e){return raw}}
function safeImageUrl(url){url=clean(url);if(!url)return '';if(url.startsWith('data:')||url.endsWith('.txt')||url.endsWith('.svg'))return '';return url}
function optimizedImageUrl(url,w){url=safeImageUrl(url);if(!url)return '';if(url.includes('commons.wikimedia.org/wiki/Special:FilePath/')){const [base,q='']=url.split('?'),p=new URLSearchParams(q);p.set('width',String(w));return base+'?'+p.toString()}if(url.includes('github.com/user-attachments/assets/'))return 'https://images.weserv.nl/?url='+encodeURIComponent(url.replace(/^https?:\/\//,''))+'&w='+w+'&output=webp&q=75';return url}
function imgSort(a,b){return Number(isIllustration(b))-Number(isIllustration(a))||Number(b.primary)-Number(a.primary)||(a.order-b.order)||0}
function isIllustration(img){return !/photograph/i.test(img.type||'')}
function addImage(key,img){key=clean(key);if(!key||!img.full)return;if(!imageCache.has(key))imageCache.set(key,[]);imageCache.get(key).push(img)}
function loadManualImages(){imageRows.forEach((r,i)=>{const full=safeImageUrl(r['Image URL']);if(!full)return;const order=Number(r['Sort order']||r['Order']||r['Image order']||i+1)||i+1,img={full,card:optimizedImageUrl(full,700),thumb:optimizedImageUrl(full,900),type:clean(r['Image type']),author:clean(r['Author']),license:clean(r['License']),source:clean(r['Source URL']),notes:clean(r['Notes']),primary:isYes(r['Primary']),order};const wl=clean(r['Wishlist ID']),pl=clean(r['Plant ID']),sl=clean(r['Seed Lot ID']),bl=clean(r['Bulb Lot ID']),name=clean(r['Scientific name']);if(wl)addImage('wishlist:'+wl,img);if(pl)addImage('plants:'+pl,img);if(sl)addImage('seeds:'+sl,img);if(bl)addImage('bulbs:'+bl,img);if(name&&isIllustration(img)){addImage(name,img);const b=baseName(name);if(b&&b!==name)addImage(b,img)}});imageCache.forEach((arr,key)=>imageCache.set(key,uniqueImages(arr)))}
function uniqueImages(arr){const seen=new Set(),out=[];(arr||[]).sort(imgSort).forEach(img=>{const k=img.full||img.thumb||img.card;if(k&&!seen.has(k)){seen.add(k);out.push(img)}});return out}
function imagesFor(x){const out=[...(imageCache.get(x.key)||[])],keys=[x.name,baseName(x.name),titleForWiki(x)].filter(Boolean),seenKey=new Set();keys.forEach(k=>{if(seenKey.has(k))return;seenKey.add(k);out.push(...(imageCache.get(k)||[]))});return uniqueImages(out)}
function imgTag(src,full,alt,cls=''){return '<img '+(cls?'class="'+esc(cls)+'" ':'')+'loading="lazy" decoding="async" src="'+esc(src)+'" data-fallback="'+esc(full)+'" onerror="this.onerror=null;this.src=this.dataset.fallback" alt="'+esc(alt)+'">'}
function imageBlock(x){const imgs=imagesFor(x);if(!imgs.length)return '<div class="placeholder">No image yet</div>';return '<div class="photo'+(imgs.length>1?' multi':'')+'">'+imgs.map(img=>imgTag(img.card,img.full,x.name)).join('')+'</div>'}
function fillFilters(){const rows=current(),fam=$('filterFamily'),fA=$('filterA'),fB=$('filterB'),pr=$('priority'),familyCounts=countValues('family'),locationCounts=countValues('location'),statusCounts=countValues('status');$('legend').textContent=mode==='plants'?'':legends[mode];$('legend').style.display=mode==='plants'?'none':'block';pr.innerHTML='';pr.add(new Option(optionText(ratingLabels[mode],rows.length),'all'));for(let i=5;i>=1;i--)pr.add(new Option('★'.repeat(i)+' and up',String(i)));pr.style.display=mode==='plants'?'none':'';fam.innerHTML='';fam.add(new Option(optionText('All families',rows.length),'all'));unique('family').forEach(v=>fam.add(new Option(optionText(v,familyCounts[v]),v)));fA.innerHTML='';fA.add(new Option(optionText(locationLabels[mode],rows.length),'all'));fB.innerHTML='';fB.add(new Option(optionText('All statuses',rows.length),'all'));unique('status').forEach(v=>fB.add(new Option(optionText(v,statusCounts[v]),v)));if(mode==='seeds'){fA.style.display='none';fA.value='all'}else{fA.style.display='';unique('location').forEach(v=>fA.add(new Option(optionText(v,locationCounts[v]),v)))}}
function matches(x){const q=$('search').value.toLowerCase();return(!q||Object.values(x).join(' ').toLowerCase().includes(q))&&($('priority').value==='all'||x.stars>=Number($('priority').value))&&($('filterFamily').value==='all'||x.family===$('filterFamily').value)&&($('filterA').value==='all'||mode==='seeds'||x.location===$('filterA').value)&&($('filterB').value==='all'||x.status===$('filterB').value)}
function emptyMessage(){return mode==='plants'?'No plants catalogued yet.':mode==='wishlist'?'No matching wishlist records.':mode==='bulbs'?'No bulb lots catalogued yet.':'No matching seed records.'}
function render(){const list=current().filter(matches).sort(alpha);$('grid').innerHTML=list.length?list.map(card).join(''):'<div class="empty">'+emptyMessage()+'</div>'}
function card(x){const seed=mode==='seeds',bulb=mode==='bulbs',leftLabel=seed?'Count':bulb?'Quantity':'Location',leftVal=seed?x.count:bulb?x.count:x.location,rightLabel=seed?'Sow by':bulb?(x.period||x.rating)?'Flowering':'Rating':'Rating',rightVal=seed?x.sowby:bulb?(x.period||x.rating):x.rating,noteVal=seed?(x.difficulty||x.notes):x.notes,noteHtml=noteVal?'<div class="notes"><span class="label">'+(seed?'Viability / notes':'Notes')+'</span>'+esc(noteVal)+'</div>':'',wikiHtml=seed&&x.wiki?'<div class="notes"><span class="label">Wikipedia</span><a style="color:var(--green);text-decoration:none" href="'+esc(x.wiki)+'" target="_blank" rel="noopener noreferrer">Wikipedia</a></div>':'',idHtml=x.wiki?esc(x.id)+' · <a href="'+esc(x.wiki)+'" target="_blank" rel="noopener noreferrer">Wiki</a>':esc(x.id),storageHtml=seed&&x.storage?'<div><span class="label">Storage</span><span class="value">'+esc(x.storage)+'</span></div>':'',miniClass=x.type==='plants'?' single':(storageHtml?' triple':'');return '<article class="card" data-key="'+esc(x.key)+'">'+imageBlock(x)+'<div class="body"><div class="top"><span class="badge family">'+esc(x.family||'—')+'</span>'+(x.type==='plants'?'':'<span class="badge rating">'+esc(x.rating||'—')+'</span>')+'</div><div><div class="name">'+esc(x.name)+'</div><div class="common">'+commonHtml(x)+'</div></div>'+noteHtml+wikiHtml+'<div class="mini'+miniClass+'"><div><span class="label">'+leftLabel+'</span><span class="value">'+esc(leftVal||'—')+'</span></div>'+(x.type==='plants'?'':'<div><span class="label">'+rightLabel+'</span><span class="value">'+esc(rightVal||'—')+'</span></div>')+storageHtml+'</div><div class="footer"><span>'+idHtml+'</span><span>'+esc(x.status||'')+'</span></div></div></article>'}
function galleryHtml(imgs){return '<div class="gallery">'+imgs.map(img=>{const bits=[img.type,img.author,img.license].filter(Boolean).map(esc).join(' · '),src=img.source?'<br><a href="'+esc(img.source)+'" target="_blank" rel="noopener noreferrer">source</a>':'';return '<figure>'+imgTag(img.thumb||img.card||img.full,img.full,'').replace('<img ','<img data-full="'+esc(img.full)+'" ')+'<figcaption>'+bits+src+'</figcaption></figure>'}).join('')+'</div>'}
let galleryImages=[],galleryIndex=0;
function showGalleryImage(){$('imgFull').src=galleryImages[galleryIndex];const multi=galleryImages.length>1;$('imgPrev').classList.toggle('hide',!multi);$('imgNext').classList.toggle('hide',!multi)}
function navGalleryImage(dir){if(galleryImages.length<2)return;galleryIndex=(galleryIndex+dir+galleryImages.length)%galleryImages.length;showGalleryImage()}
function openImage(imgs,idx){galleryImages=imgs;galleryIndex=idx;showGalleryImage();$('imgDlg').showModal()}
function renderModal(x){const imgs=imagesFor(x);$('title').textContent=x.name;$('common').innerHTML=commonHtml(x);$('badges').innerHTML='<span class="badge family">'+esc(x.family||'—')+'</span> '+(x.type==='plants'?'':'<span class="badge rating">'+esc(x.rating||'—')+'</span>');const fields=[];if(imgs.length)fields.push(['Images',galleryHtml(imgs),true]);else fields.push(['Images','<span style="color:var(--muted)">No image yet</span>',true]);Object.entries(x).forEach(([k,v])=>{if(['type','key','stars','name','common','commonDe','commonPt'].includes(k)||(x.type==='plants'&&k==='rating')||!clean(v))return;let val=esc(v);if(/^https?:\/\//.test(clean(v)))val='<a href="'+esc(v)+'" target="_blank" rel="noopener noreferrer">'+esc(v)+'</a>';const label=mode==='plants'?(fieldLabels[k]||maps[mode][k]||k):(maps[mode][k]||fieldLabels[k]||k);fields.push([label,val,['notes','origin','source'].includes(k)])});$('modal').innerHTML=fields.map(([label,v,full])=>'<div class="field '+(full?'full':'')+'"><div class="field-title">'+esc(label)+'</div><div class="field-value">'+v+'</div></div>').join('')}
function openItem(key){const x=byKey.get(key);if(!x)return;renderModal(x);$('dlg').showModal()}
function setMode(next){mode=next;['wishlist','plants','seeds','bulbs'].forEach(m=>$(m+'Btn').classList.toggle('active',mode===m));$('search').value='';fillFilters();$('priority').value='all';$('filterFamily').value='all';$('filterA').value='all';$('filterB').value='all';render();scrollTo({top:0,behavior:'smooth'})}
// NFC / URL parameter support — tap an NFC tag to open a plant directly
// Tag URL format: https://driftwoodye.github.io/Driftwood-Garden/?plant=Euphorbia+milii
// Or by ID:       https://driftwoodye.github.io/Driftwood-Garden/?id=SBC-PLANT-0002
function handleUrlParam(){const p=new URLSearchParams(location.search);const plantName=p.get('plant'),plantId=p.get('id');if(!plantName&&!plantId)return;const all=[...data.wishlist,...data.plants,...data.seeds,...data.bulbs];let target=null;if(plantId){target=all.find(x=>clean(x.id).toLowerCase()===clean(plantId).toLowerCase())}else{target=all.find(x=>clean(x.name).toLowerCase()===clean(plantName).toLowerCase())}if(!target)return;setMode(target.type);setTimeout(()=>openItem(target.key),120)}
$('wishlistBtn').onclick=()=>setMode('wishlist');$('plantsBtn').onclick=()=>setMode('plants');$('seedsBtn').onclick=()=>setMode('seeds');$('bulbsBtn').onclick=()=>setMode('bulbs');$('closeBtn').onclick=()=>$('dlg').close();$('imgClose').onclick=()=>{$('imgDlg').close();$('imgFull').src=''};$('imgPrev').onclick=e=>{e.stopPropagation();navGalleryImage(-1)};$('imgNext').onclick=e=>{e.stopPropagation();navGalleryImage(1)};$('imgFull').addEventListener('click',e=>{if(galleryImages.length<2)return;const rect=e.currentTarget.getBoundingClientRect();navGalleryImage(e.clientX-rect.left<rect.width/2?-1:1)});document.addEventListener('keydown',e=>{if(!$('imgDlg').open)return;if(e.key==='ArrowLeft')navGalleryImage(-1);else if(e.key==='ArrowRight')navGalleryImage(1)});$('imgDlg').addEventListener('click',e=>{if(e.target.id==='imgDlg'){$('imgDlg').close();$('imgFull').src=''}});$('modal').addEventListener('click',e=>{const im=e.target.closest('img[data-full]');if(im){e.stopPropagation();const imgs=[...$('modal').querySelectorAll('img[data-full]')];openImage(imgs.map(i=>i.dataset.full),imgs.indexOf(im))}});let touchStartX=null;$('imgFull').addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].clientX},{passive:true});$('imgFull').addEventListener('touchend',e=>{if(touchStartX===null)return;const dx=e.changedTouches[0].clientX-touchStartX;touchStartX=null;if(Math.abs(dx)>40)navGalleryImage(dx<0?1:-1)});['search','priority','filterFamily','filterA','filterB'].forEach(id=>{$(id).addEventListener('input',render);$(id).addEventListener('change',render)});$('grid').addEventListener('click',e=>{const c=e.target.closest('.card');if(c)openItem(c.dataset.key)});window.addEventListener('scroll',()=>$('toTop').classList.toggle('show',scrollY>500));$('toTop').onclick=()=>scrollTo({top:0,behavior:'smooth'});
(async function init(){try{const [wl,pl,seeds,bulbs,imgText,illustrationsText]=await Promise.all([optionalCSV(files.wishlist),optionalCSV(files.plants),optionalCSV(files.seeds),optionalCSV(files.bulbs),optionalCSV(files.images),optionalCSV(files.illustrations)]);data.wishlist=mergeById(transform(toObjects(wl),maps.wishlist,'wishlist'));data.plants=mergeById(transform(toObjects(pl),maps.plants,'plants'));data.seeds=mergeById(transform(toObjects(seeds),maps.seeds,'seeds'));data.bulbs=mergeById(transform(toObjects(bulbs),maps.bulbs,'bulbs'));imageRows=[...(imgText?toObjects(imgText):[]),...(illustrationsText?toObjects(illustrationsText):[])];loadManualImages();byKey=new Map([...data.wishlist,...data.plants,...data.seeds,...data.bulbs].map(x=>[x.key,x]));fillFilters();render();handleUrlParam()}catch(err){console.error(err);$('grid').innerHTML='<div class="empty">Could not load catalogue files.</div>'}})();
</script>
