name: Build Commons image cache

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build commons-cache.json
        run: node scripts/build-commons-cache.mjs

      - name: Commit and push if cache changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- commons-cache.json; then
            echo "No changes to commit"
          else
            git add commons-cache.json
            git commit -m "Update Commons image cache"
            git push
          fi
