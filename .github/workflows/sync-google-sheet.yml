name: Sync Google Sheet to CSVs

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [sheet-updated]

permissions:
  contents: write

# repository_dispatch fires once per sheet edit, so bursts of edits can queue
# up several runs back-to-back. Serialize them (don't cancel) so each run's
# git push sees the previous run's commit instead of racing it.
concurrency:
  group: sync-google-sheet
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch sheet tabs and write CSVs
        run: node scripts/sync-sheet.mjs

      - name: Commit and push if CSVs changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plants.csv seeds.csv bulbs.csv wishlist.csv images.csv; then
            echo "No changes to commit"
          else
            git add plants.csv seeds.csv bulbs.csv wishlist.csv images.csv
            git commit -m "Sync CSVs from Google Sheet"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push rejected (attempt $i), rebasing onto latest main and retrying"
              git fetch origin main
              git rebase origin/main
            done
          fi
