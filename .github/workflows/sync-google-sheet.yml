name: Sync Google Sheet to CSVs

on:
  # Schedule disabled: the sheet's tabs don't currently match the CSVs'
  # columns/row counts, so syncing overwrote good data with far less of
  # it (see commit 5413540). Re-enable the cron schedule below only
  # after confirming each tab is fully populated and its header row
  # matches maps.* in index.html.
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [sheet-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch sheet tabs and write CSVs
        run: node scripts/sync-sheet.mjs

      - name: Commit and push if CSVs changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- plants.csv seeds.csv bulbs.csv wishlist.csv images.csv; then
            echo "No changes to commit"
          else
            git add plants.csv seeds.csv bulbs.csv wishlist.csv images.csv
            git commit -m "Sync CSVs from Google Sheet"
            git push
          fi
